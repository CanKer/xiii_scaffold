
service: telegram-bot-hex-lambda
frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-central-1
  architecture: arm64
  environment:
    NODE_OPTIONS: --enable-source-maps
    MODE: ${env:MODE}
    INTERVAL_MINUTES: ${env:INTERVAL_MINUTES}
    ADMIN_TELEGRAM_ID: ${env:ADMIN_TELEGRAM_ID}
  httpApi:
    cors: true

plugins:
  - serverless-offline
package:
  patterns:
    - '!tests/**'
    - '!coverage/**'
    - '!**/*.spec.ts'

functions:
  webhook:
    handler: dist/infrastructure/http/handlers/webhookHandler.handler
    events:
      - httpApi:
          path: /webhook
          method: post

  healthz:
    handler: dist/infrastructure/http/handlers/healthHandlers.healthz
    events:
      - httpApi:
          path: /healthz
          method: get

  readyz:
    handler: dist/infrastructure/http/handlers/healthHandlers.readyz
    events:
      - httpApi:
          path: /readyz
          method: get
